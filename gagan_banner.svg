<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 320" width="100%" height="100%">
  <defs>
    <!-- Fonts, gradients, filters -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1d" />
      <stop offset="50%" stop-color="#070a13" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" /> <!-- Indigo -->
      <stop offset="50%" stop-color="#a855f7" /> <!-- Purple -->
      <stop offset="100%" stop-color="#ec4899" /> <!-- Pink -->
    </linearGradient>

    <linearGradient id="sub-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" /> <!-- Sky blue -->
      <stop offset="100%" stop-color="#818cf8" /> <!-- Indigo-400 -->
    </linearGradient>

    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#db2777" stop-opacity="0.05" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&amp;family=Fira+Code:wght@400;500&amp;display=swap');

    .title {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-weight: 800;
      font-size: 54px;
      fill: url(#text-grad);
      filter: drop-shadow(0px 4px 12px rgba(168, 85, 247, 0.35));
    }

    .greeting {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-weight: 600;
      font-size: 20px;
      fill: #94a3b8;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeIn 1s ease-out 0.2s forwards;
    }

    .subtitle {
      font-family: 'Fira Code', monospace;
      font-weight: 500;
      font-size: 24px;
      fill: url(#sub-grad);
    }

    .tech-stack-text {
      font-family: 'Outfit', -apple-system, sans-serif;
      font-size: 14px;
      fill: #64748b;
      letter-spacing: 1px;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeIn 1s ease-out 0.6s forwards;
    }

    /* Grid background animation */
    .grid-line {
      stroke: #334155;
      stroke-opacity: 0.15;
      stroke-width: 1;
    }

    /* Particle / Node animations */
    .node {
      fill: #818cf8;
      fill-opacity: 0.6;
      filter: drop-shadow(0 0 6px #818cf8);
    }

    .node-pulse {
      animation: pulse 3s infinite ease-in-out;
    }

    .node-pulse-delayed {
      animation: pulse 3s infinite ease-in-out 1.5s;
    }

    .connection-line {
      stroke: #818cf8;
      stroke-opacity: 0.15;
      stroke-dasharray: 5, 5;
      animation: dash 30s linear infinite;
    }

    /* Keyframes */
    @keyframes fadeIn {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.3; }
      50% { transform: scale(1.5); opacity: 0.9; }
    }

    @keyframes dash {
      to { stroke-dashoffset: -1000; }
    }

    /* Multi-text slide/cycle animation */
    .role-text {
      opacity: 0;
      transform: translateY(15px);
      animation: cycleRoles 12s infinite ease-in-out;
    }

    .role-1 { animation-delay: 0s; }
    .role-2 { animation-delay: 4s; }
    .role-3 { animation-delay: 8s; }

    @keyframes cycleRoles {
      0%, 2.5% { opacity: 0; transform: translateY(15px); }
      5%, 30% { opacity: 1; transform: translateY(0); }
      32.5%, 35% { opacity: 0; transform: translateY(-15px); }
      100% { opacity: 0; }
    }

    /* Floating shapes */
    .float-shape {
      animation: float 6s infinite ease-in-out;
    }
    .float-shape-2 {
      animation: float 8s infinite ease-in-out 2s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-12px) rotate(3deg); }
    }
  </style>

  <!-- Background -->
  <rect width="1000" height="320" fill="url(#bg-grad)" />

  <!-- Animated Glowing Spots -->
  <circle cx="900" cy="80" r="250" fill="url(#glow-grad)" filter="url(#glow)" />
  <circle cx="100" cy="240" r="200" fill="url(#glow-grad)" filter="url(#glow)" />

  <!-- Animated grid lines -->
  <g>
    <!-- Horizontal -->
    <line x1="0" y1="40" x2="1000" y2="40" class="grid-line" />
    <line x1="0" y1="80" x2="1000" y2="80" class="grid-line" />
    <line x1="0" y1="120" x2="1000" y2="120" class="grid-line" />
    <line x1="0" y1="160" x2="1000" y2="160" class="grid-line" />
    <line x1="0" y1="200" x2="1000" y2="200" class="grid-line" />
    <line x1="0" y1="240" x2="1000" y2="240" class="grid-line" />
    <line x1="0" y1="280" x2="1000" y2="280" class="grid-line" />

    <!-- Vertical -->
    <line x1="100" y1="0" x2="100" y2="320" class="grid-line" />
    <line x1="200" y1="0" x2="200" y2="320" class="grid-line" />
    <line x1="300" y1="0" x2="300" y2="320" class="grid-line" />
    <line x1="400" y1="0" x2="400" y2="320" class="grid-line" />
    <line x1="500" y1="0" x2="500" y2="320" class="grid-line" />
    <line x1="600" y1="0" x2="600" y2="320" class="grid-line" />
    <line x1="700" y1="0" x2="700" y2="320" class="grid-line" />
    <line x1="800" y1="0" x2="800" y2="320" class="grid-line" />
    <line x1="900" y1="0" x2="900" y2="320" class="grid-line" />
  </g>

  <!-- Animated network lines/nodes (representing AI/Tech) -->
  <g class="float-shape">
    <line x1="820" y1="60" x2="900" y2="120" class="connection-line" />
    <line x1="900" y1="120" x2="860" y2="200" class="connection-line" />
    <line x1="860" y1="200" x2="820" y2="60" class="connection-line" />
    
    <circle cx="820" cy="60" r="5" class="node node-pulse" />
    <circle cx="900" cy="120" r="7" class="node node-pulse-delayed" />
    <circle cx="860" cy="200" r="4" class="node node-pulse" />
  </g>

  <g class="float-shape-2">
    <line x1="120" y1="80" x2="80" y2="160" class="connection-line" />
    <line x1="80" y1="160" x2="150" y2="200" class="connection-line" />
    
    <circle cx="120" cy="80" r="6" class="node node-pulse-delayed" />
    <circle cx="80" cy="160" r="4" class="node node-pulse" />
    <circle cx="150" cy="200" r="5" class="node node-pulse-delayed" />
  </g>

  <!-- Decorative modern shapes -->
  <text x="60" y="80" font-family="'Fira Code', monospace" font-size="28" fill="#475569" fill-opacity="0.3" class="float-shape">&lt;/&gt;</text>
  <text x="910" y="260" font-family="'Fira Code', monospace" font-size="28" fill="#475569" fill-opacity="0.3" class="float-shape-2">{ }</text>

  <!-- Main content centered vertically & left-aligned or centered -->
  <g transform="translate(100, 0)">
    <!-- Greetings -->
    <text x="0" y="105" class="greeting">HI THERE 👋, I'M</text>
    
    <!-- Title -->
    <text x="0" y="165" class="title">Gagan Kalakota</text>
    
    <!-- Subtitle with cycling/typing-like animation -->
    <g transform="translate(0, 215)">
      <text x="0" y="0" class="subtitle role-text role-1">&gt; B.Tech CSE Student</text>
      <text x="0" y="0" class="subtitle role-text role-2">&gt; Full Stack Developer</text>
      <text x="0" y="0" class="subtitle role-text role-3">&gt; AI Enthusiast &amp; Learner</text>
    </g>

    <!-- Small static info line -->
    <text x="0" y="265" class="tech-stack-text">SPECIALIZING IN MERN STACK • PYTHON • AI-POWERED SOLUTIONS</text>
  </g>

  <!-- Bottom neon accent border -->
  <rect x="0" y="315" width="1000" height="5" fill="url(#text-grad)" opacity="0.9" />
</svg>
